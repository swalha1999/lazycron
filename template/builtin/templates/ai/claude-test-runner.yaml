name: Claude Test Runner
category: ai
description: Run Claude Code to execute and analyze test results
schedule: "30 8 * * 1-5"
command: "cd $REPO_PATH && claude -p 'Run the test suite with $TEST_CMD, analyze any failures, and create a summary report'"
variables:
  - name: REPO_PATH
    prompt: "Repository path"
    default: /home/user/project
  - name: TEST_CMD
    prompt: "Test command"
    default: "go test ./..."

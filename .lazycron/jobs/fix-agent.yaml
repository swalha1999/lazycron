name: Security Fix Agent
schedule: "0 9 * * *"
command: >-
  cd /home/swalha/code/lazycron &&
  OPEN_PRS=$(gh pr list --state open --json number -q 'length') &&
  if [ "$OPEN_PRS" -ge 3 ]; then echo "Too many open PRs ($OPEN_PRS), skipping"; exit 0; fi &&
  ISSUE=$(gh issue list -l security --state open --json number,title --jq 'sort_by(.number) | .[0].number') &&
  if [ -z "$ISSUE" ]; then echo "No open security issues, skipping"; exit 0; fi &&
  BRANCH="fix/issue-${ISSUE}-$(date +%Y%m%d)" &&
  git checkout main && git pull && git checkout -b "$BRANCH" &&
  claude -p --dangerously-skip-permissions "You are a fix agent. Your job:
  1. Read issue #${ISSUE} using \`gh issue view ${ISSUE}\`.
  2. Fix the bug described in the issue. Make minimal, focused changes.
  3. Commit your changes with a clear message referencing the issue.
  4. Push the branch and open a PR with \`gh pr create --title \"Fix #${ISSUE}: <short description>\" --body \"Closes #${ISSUE}\n\n<explanation of fix>\" --label bug\`.
  Rules: Fix only ONE issue. Do NOT modify unrelated code. Keep the diff small and reviewable.
  IMPORTANT: If you are not confident you fully understand the bug or your fix is correct, STAND DOWN — delete the branch and exit cleanly without opening a PR. Do not submit uncertain or partial fixes.
  The build, linting, and tests must all pass before opening a PR."
project: LazyCron
tag: BP
tag_color: "#f38ba8"
